services:
  app:
    build: .
    image: tender-insight:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://tender:tender@postgres:5432/tender_insight
      REDIS_URL: redis://redis:6379
      DATA_DIR: /app/data
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tender_insight
      POSTGRES_USER: tender
      POSTGRES_PASSWORD: tender
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tender -d tender_insight"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  app-data:
  postgres-data:
  redis-data:
